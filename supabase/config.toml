# Minimal local config. Run `supabase init` against your project to expand this,
# or set project_id to your project ref. See https://supabase.com/docs/guides/cli/config
project_id = "lawfficient"

[auth]
enable_signup = true
# Local dev: the app runs on :3099, so invite/recovery links resolve there.
site_url = "http://localhost:3099"
additional_redirect_urls = ["http://localhost:3099/**"]
# Email/password only for v1. MFA (TOTP) is optional and added per spec 10.

[auth.email]
enable_confirmations = false

# Invite email points at the app's /auth/confirm route (token_hash flow), which
# verifies the link then sends the user to /set-password. See specs/24-user-management.md.
[auth.email.template.invite]
subject = "You've been invited to Lawfficient"
content_path = "./supabase/templates/invite.html"

# Google OAuth ("Continue with Google"). Requires credentials — create an OAuth
# client at https://console.cloud.google.com, then set SUPABASE_AUTH_GOOGLE_CLIENT_ID
# and SUPABASE_AUTH_GOOGLE_SECRET (e.g. in .env) and flip enabled = true. Left off by
# default so the local stack starts without credentials. On the hosted project,
# configure this in the dashboard (Authentication → Providers → Google) instead.
[auth.external.google]
enabled = false
client_id = "env(SUPABASE_AUTH_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
