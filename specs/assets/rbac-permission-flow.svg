<svg viewBox="0 0 760 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, system-ui, sans-serif">
<title>RBAC permission flow</title>
<desc>Roles and their permissions are stored per firm. At login, custom_access_token_hook unions your permissions into the JWT. On every request, authorize() in database RLS is the real gate and hasPermission() in the UI is cosmetic.</desc>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#888780"/>
</marker>
</defs>
<rect x="0" y="0" width="760" height="600" fill="#1B1B19"/>

<text x="20" y="30" font-size="12" font-weight="600" fill="#B4B2A9" letter-spacing="0.5">1 · STORED PER FIRM</text>
<rect x="40" y="44" width="130" height="54" rx="10" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="105" y="69" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">You</text>
<text x="105" y="87" text-anchor="middle" font-size="11" fill="#5F5E5A">a staff user</text>
<line x1="170" y1="71" x2="232" y2="71" stroke="#888780" marker-end="url(#ah)"/>
<rect x="234" y="44" width="180" height="54" rx="10" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="324" y="69" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Roles</text>
<text x="324" y="87" text-anchor="middle" font-size="11" fill="#5F5E5A">admin, attorney, file clerk…</text>
<line x1="414" y1="71" x2="476" y2="71" stroke="#888780" marker-end="url(#ah)"/>
<rect x="478" y="44" width="244" height="54" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="600" y="69" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Permissions</text>
<text x="600" y="87" text-anchor="middle" font-size="11" fill="#0F6E56">leads.view, cases.edit, settings.manage…</text>
<text x="40" y="122" font-size="11" fill="#B4B2A9">Join tables: user_roles (you → roles, multi-role) · role_permissions (roles → permissions). All firm-scoped.</text>
<line x1="324" y1="140" x2="324" y2="166" stroke="#888780" marker-end="url(#ah)"/>

<text x="20" y="158" font-size="12" font-weight="600" fill="#B4B2A9" letter-spacing="0.5">2 · AT LOGIN</text>
<rect x="150" y="168" width="346" height="56" rx="10" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="323" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">custom_access_token_hook()</text>
<text x="323" y="211" text-anchor="middle" font-size="11" fill="#5F5E5A">unions all your roles' permissions</text>
<line x1="323" y1="224" x2="323" y2="250" stroke="#888780" marker-end="url(#ah)"/>
<text x="334" y="243" font-size="11" fill="#0F6E56">stamps</text>
<rect x="120" y="252" width="406" height="72" rx="10" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="323" y="276" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Your login token (JWT)</text>
<text x="323" y="298" text-anchor="middle" font-size="11.5" fill="#0F6E56" font-family="ui-monospace, monospace">app_metadata.permissions: ["leads.view", …]</text>
<text x="323" y="315" text-anchor="middle" font-size="11" fill="#5F5E5A">travels in every request — no DB lookup needed</text>
<line x1="323" y1="324" x2="323" y2="340" stroke="#888780"/>
<line x1="200" y1="340" x2="560" y2="340" stroke="#888780"/>
<line x1="200" y1="340" x2="200" y2="372" stroke="#888780" marker-end="url(#ah)"/>
<line x1="560" y1="340" x2="560" y2="372" stroke="#888780" marker-end="url(#ah)"/>

<text x="20" y="364" font-size="12" font-weight="600" fill="#B4B2A9" letter-spacing="0.5">3 · ON EVERY REQUEST</text>
<rect x="70" y="374" width="260" height="88" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.5"/>
<rect x="92" y="393" width="14" height="11" rx="2" fill="none" stroke="#04342C" stroke-width="1.5"/>
<path d="M95 393 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#04342C" stroke-width="1.5"/>
<text x="115" y="403" font-size="13" font-weight="700" fill="#04342C">authorize() in RLS</text>
<text x="92" y="427" font-size="11.5" fill="#04342C">The real gate. Database policies</text>
<text x="92" y="443" font-size="11.5" fill="#04342C">check the token for the permission.</text>
<text x="92" y="458" font-size="11" fill="#0F6E56">Blocked even via API or script.</text>
<rect x="430" y="374" width="260" height="88" rx="10" fill="#F1EFE8" stroke="#888780" stroke-dasharray="5 4"/>
<text x="452" y="403" font-size="13" font-weight="700" fill="#2C2C2A">hasPermission() in UI</text>
<text x="452" y="427" font-size="11.5" fill="#444441">Cosmetic. Reads the same claim</text>
<text x="452" y="443" font-size="11.5" fill="#444441">to hide buttons you can't use.</text>
<text x="452" y="458" font-size="11" fill="#5F5E5A">Not a security boundary.</text>

<rect x="70" y="486" width="620" height="46" rx="8" fill="#F1EFE8" stroke="#B4B2A9"/>
<text x="84" y="507" font-size="11.5" font-weight="600" fill="#2C2C2A">Transition-safety:</text>
<text x="84" y="524" font-size="11.5" fill="#444441">before the hook, a token has no permissions claim — so both fall back to the old role check. Nothing breaks until you flip it on.</text>

<rect x="70" y="550" width="13" height="13" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="90" y="561" font-size="11" fill="#B4B2A9">teal = your permissions claim and where it's truly enforced</text>
</svg>
